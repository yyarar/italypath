  fallback_year: "Use the newest official academic year available when 2026/2027 is not published for a programme, and flag the fallback in uncertainty_notes."
scope:
  included_programmes:
    - "Bachelor's degree programmes listed on Ca' Foscari's official International programmes page as taught in English for a.y. 2026/2027."
    - "Master's degree programmes listed on Ca' Foscari's official International programmes page as taught in English for a.y. 2026/2027."
    - "Programmes with English-taught curricula or tracks when the official programme list names that English curriculum."
  excluded_programmes:
    - "Doctoral degrees, professional master's programmes, Foundation Year, exchange-only routes, single courses, summer schools, and double/joint degree mobility calls unless needed as context for a listed degree programme."
    - "Programmes taught only in Italian."
  item_definition: "Each item is one official English-taught degree programme entry from the 2026/2027 International programmes list."
  current_known_counts:
    bachelor_items: 8
    master_items: 21
    single_cycle_items: 0
    total_items: 29
