topic: "Milano-Bicocca (UNIMIB) İngilizce eğitim veren Bachelor ve Master programlarının admission requirements bilgileri"
academic_year_priority: ["2026/2027", "2025/2026"]
source_constraint: "Yalnızca unimib.it / en.unimib.it / apply.unimib.it / *.unimib.it altındaki resmi sayfalar"
scope:
  include:
    - bachelor (laurea triennale, English-taught)
    - master (laurea magistrale, English-taught)
  exclude:
    - single-cycle (Medicine in English — kapsam dışı)
    - PhD
    - Italian-taught programmes
    - partial English / "some teachings in English on demand" durumundakiler

