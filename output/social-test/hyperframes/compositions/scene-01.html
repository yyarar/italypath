<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
  </head>
  <body>
    <template>
      <style>
        @font-face {
          font-family: "Spectral";
          font-style: normal;
          font-weight: 600;
          font-display: swap;
          src: url("assets/fonts/spectral-600-latin-ext.woff2") format("woff2");
          unicode-range: U+0100-024F, U+1E00-1EFF;
        }
        @font-face {
          font-family: "Spectral";
          font-style: normal;
          font-weight: 600;
          font-display: swap;
          src: url("assets/fonts/spectral-600-latin.woff2") format("woff2");
        }
        @font-face {
          font-family: "Hanken Grotesk";
          font-style: normal;
          font-weight: 100 900;
          font-display: swap;
          src: url("assets/fonts/hanken-latin-ext.woff2") format("woff2");
          unicode-range: U+0100-024F, U+1E00-1EFF;
        }
        @font-face {
          font-family: "Hanken Grotesk";
          font-style: normal;
          font-weight: 100 900;
          font-display: swap;
          src: url("assets/fonts/hanken-latin.woff2") format("woff2");
        }

        #root {
          position: absolute;
          inset: 0;
          width: 1080px;
          height: 1920px;
          overflow: hidden;
          color: #f8f7f1;
        }

        .photo,
        .grade,
        .scrim,
        .grain {
          position: absolute;
          inset: 0;
          width: 100%;
          height: 100%;
        }

        .photo {
          display: block;
          object-fit: cover;
          filter: saturate(0.82) contrast(1.08) brightness(0.88);
          transform-origin: 50% 50%;
          will-change: transform;
        }

        .grade {
          background:
            radial-gradient(circle at 70% 15%, rgba(248, 247, 241, 0.13), rgba(248, 247, 241, 0) 34%),
            linear-gradient(180deg, rgba(31, 79, 70, 0.08), rgba(21, 32, 28, 0.22));
        }

        .scrim {
          background:
            linear-gradient(180deg, rgba(21, 32, 28, 0.06) 20%, rgba(21, 32, 28, 0.14) 48%, rgba(21, 32, 28, 0.78) 83%, rgba(21, 32, 28, 0.88) 100%),
            radial-gradient(circle at 18% 70%, rgba(21, 32, 28, 0.32), rgba(21, 32, 28, 0) 46%);
        }

        .grain {
          opacity: 0.18;
          mix-blend-mode: soft-light;
          background-image:
            repeating-radial-gradient(circle at 20% 30%, rgba(248, 247, 241, 0.28) 0 0.7px, rgba(21, 32, 28, 0) 0.9px 3px);
          background-size: 7px 7px;
        }

        .meta {
          position: absolute;
          top: 302px;
          left: 96px;
          right: 96px;
          display: flex;
          align-items: center;
          justify-content: space-between;
          font-family: "Hanken Grotesk", sans-serif;
          font-size: 22px;
          font-weight: 650;
          line-height: 1;
          letter-spacing: 0.22em;
          text-transform: uppercase;
          color: rgba(248, 247, 241, 0.84);
        }

        .meta-index {
          font-variant-numeric: tabular-nums;
          color: #e7c9b8;
        }

        .copy {
          position: absolute;
          left: 96px;
          right: 92px;
          top: 1060px;
          display: flex;
          flex-direction: column;
          align-items: flex-start;
          gap: 34px;
        }

        .accent-rule {
          width: 118px;
          height: 4px;
          background: #b75b38;
          transform-origin: left center;
        }

        .title {
          max-width: 820px;
          font-family: "Spectral", serif;
          font-size: 112px;
          font-weight: 600;
          line-height: 0.96;
          letter-spacing: -0.045em;
          text-wrap: balance;
          text-shadow: 0 8px 30px rgba(21, 32, 28, 0.32);
        }

        .corner {
          position: absolute;
          width: 30px;
          height: 30px;
          opacity: 0.78;
        }

        .corner.tl { top: 270px; left: 72px; border-top: 2px solid #e7c9b8; border-left: 2px solid #e7c9b8; }
        .corner.tr { top: 270px; right: 72px; border-top: 2px solid #e7c9b8; border-right: 2px solid #e7c9b8; }
        .corner.bl { bottom: 334px; left: 72px; border-bottom: 2px solid #e7c9b8; border-left: 2px solid #e7c9b8; }
        .corner.br { bottom: 334px; right: 72px; border-bottom: 2px solid #e7c9b8; border-right: 2px solid #e7c9b8; }
      </style>

      <div id="root" data-composition-id="scene01" data-width="1080" data-height="1920" data-duration="4.3">
        <img id="scene01-photo" class="photo" data-layout-allow-overflow src="assets/images/scene-01-rome-dawn.png" alt="" />
        <div class="grade"></div>
        <div class="scrim"></div>
        <div id="scene01-grain" class="grain"></div>

        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>

        <div id="scene01-meta" class="meta">
          <span>ItalyPath</span>
          <span class="meta-index">01 / 04</span>
        </div>

        <div id="scene01-copy" class="copy">
          <div id="scene01-rule" class="accent-rule"></div>
          <div class="title">İtalya hayalin</div>
        </div>
      </div>

      <script>
        window.__timelines = window.__timelines || {};
        const scene01 = gsap.timeline({ paused: true });

        scene01.fromTo(
          "#scene01-photo",
          { scale: 1.035, x: -10, y: -12 },
          { scale: 1.085, x: 12, y: 8, duration: 4.3, ease: "none" },
          0,
        );
        scene01.fromTo(
          "#scene01-copy",
          { y: 30, opacity: 0 },
          { y: 0, opacity: 1, duration: 0.78, ease: "power2.out" },
          0.18,
        );
        scene01.fromTo(
          "#scene01-rule",
          { scaleX: 0 },
          { scaleX: 1, duration: 0.62, ease: "power3.out" },
          0.28,
        );
        scene01.fromTo(
          "#scene01-meta",
          { y: -14, opacity: 0 },
          { y: 0, opacity: 1, duration: 0.72, ease: "sine.out" },
          0.42,
        );
        scene01.fromTo(
          "#scene01-grain",
          { opacity: 0.14, x: 0 },
          { opacity: 0.2, x: 3, duration: 4.3, ease: "none" },
          0,
        );

        window.__timelines["scene01"] = scene01;
      </script>
    </template>
  </body>
</html>
