          font-weight: 600;

          unicode-range: U+0100-024F, U+1E00-1EFF;

        @font-face {

        #root {
          position: absolute;
          inset: 0;
          width: 1080px;
          height: 1920px;
          overflow: hidden;
          color: #f8f7f1;
        }

        .photo,
        .grade,
        .scrim,
        .grain {
          position: absolute;
          inset: 0;
          width: 100%;
          height: 100%;
        }

        .photo {
          display: block;
          object-fit: cover;
          filter: saturate(0.82) contrast(1.07) brightness(0.86);
          transform-origin: 50% 56%;
          will-change: transform;
        }

        .grade {
          background:
            radial-gradient(circle at 72% 22%, rgba(183, 91, 56, 0.12), rgba(183, 91, 56, 0) 38%),
            linear-gradient(180deg, rgba(31, 79, 70, 0.14), rgba(21, 32, 28, 0.18));
        }

        .scrim {
          background:
            linear-gradient(180deg, rgba(21, 32, 28, 0.44) 16%, rgba(21, 32, 28, 0.58) 42%, rgba(21, 32, 28, 0.08) 70%, rgba(21, 32, 28, 0.42) 100%),
            radial-gradient(circle at 16% 42%, rgba(21, 32, 28, 0.5), rgba(21, 32, 28, 0) 50%);
        }

        .grain {
          opacity: 0.18;
          mix-blend-mode: soft-light;
          background-image:
            repeating-radial-gradient(circle at 70% 20%, rgba(248, 247, 241, 0.28) 0 0.7px, rgba(21, 32, 28, 0) 0.9px 3px);
          background-size: 7px 7px;
        }

        .meta {
          position: absolute;
          top: 302px;

          font-weight: 650;

          letter-spacing: 0.22em;
          text-transform: uppercase;
          color: rgba(248, 247, 241, 0.84);
        }

        .meta-index {
          font-variant-numeric: tabular-nums;
          color: #e7c9b8;
        }

        .copy {

          left: 96px;
          right: 86px;

          gap: 34px;

        .accent-rule {
          width: 118px;
          height: 4px;
          background: #b75b38;
          transform-origin: left center;
        }

        .title {
          max-width: 850px;
          font-family: "Spectral", serif;
          font-size: 102px;

          line-height: 0.96;

</html>
