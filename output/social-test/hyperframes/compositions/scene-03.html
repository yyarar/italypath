<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
  </head>
  <body>
    <template>
      <style>
        @font-face {
          font-family: "Spectral";
          font-style: normal;
          font-weight: 600;
          font-display: swap;
          src: url("assets/fonts/spectral-600-latin-ext.woff2") format("woff2");
          unicode-range: U+0100-024F, U+1E00-1EFF;
        }
        @font-face {
          font-family: "Spectral";
          font-style: normal;
          font-weight: 600;
          font-display: swap;
          src: url("assets/fonts/spectral-600-latin.woff2") format("woff2");
        }
        @font-face {
          font-family: "Hanken Grotesk";
          font-style: normal;
          font-weight: 100 900;
          font-display: swap;
          src: url("assets/fonts/hanken-latin-ext.woff2") format("woff2");
          unicode-range: U+0100-024F, U+1E00-1EFF;
        }
        @font-face {
          font-family: "Hanken Grotesk";
          font-style: normal;
          font-weight: 100 900;
          font-display: swap;
          src: url("assets/fonts/hanken-latin.woff2") format("woff2");
        }

        #root {
          position: absolute;
          inset: 0;
          width: 1080px;
          height: 1920px;
          overflow: hidden;
          color: #f8f7f1;
        }

        .photo,
        .grade,
        .scrim,
        .grain {
          position: absolute;
          inset: 0;
          width: 100%;
          height: 100%;
        }

        .photo {
          display: block;
          object-fit: cover;
          filter: saturate(0.82) contrast(1.07) brightness(0.86);
          transform-origin: 58% 48%;
          will-change: transform;
        }

        .grade {
          background:
            radial-gradient(circle at 74% 25%, rgba(248, 247, 241, 0.12), rgba(248, 247, 241, 0) 36%),
            linear-gradient(180deg, rgba(31, 79, 70, 0.04), rgba(21, 32, 28, 0.24));
        }

        .scrim {
          background:
            linear-gradient(180deg, rgba(21, 32, 28, 0.08) 30%, rgba(21, 32, 28, 0.22) 56%, rgba(21, 32, 28, 0.8) 84%, rgba(21, 32, 28, 0.9) 100%),
            radial-gradient(circle at 20% 72%, rgba(21, 32, 28, 0.42), rgba(21, 32, 28, 0) 52%);
        }

        .grain {
          opacity: 0.18;
          mix-blend-mode: soft-light;
          background-image:
            repeating-radial-gradient(circle at 35% 65%, rgba(248, 247, 241, 0.28) 0 0.7px, rgba(21, 32, 28, 0) 0.9px 3px);
          background-size: 7px 7px;
        }

        .meta {
          position: absolute;
          top: 302px;
          left: 96px;
          right: 96px;
          display: flex;
          align-items: center;
          justify-content: space-between;
          font-family: "Hanken Grotesk", sans-serif;
          font-size: 22px;
          font-weight: 650;
          line-height: 1;
          letter-spacing: 0.22em;
          text-transform: uppercase;
          color: rgba(248, 247, 241, 0.84);
        }

        .meta-index {
          font-variant-numeric: tabular-nums;
          color: #e7c9b8;
        }

        .copy {
          position: absolute;
          left: 96px;
          right: 82px;
          top: 1090px;
          display: flex;
          flex-direction: column;
          align-items: flex-start;
          gap: 32px;
        }

        .accent-rule {
          width: 118px;
          height: 4px;
          background: #b75b38;
          transform-origin: left center;
        }

        .title {
          max-width: 855px;
          font-family: "Spectral", serif;
          font-size: 100px;
          font-weight: 600;
          line-height: 0.97;
          letter-spacing: -0.046em;
          text-wrap: balance;
          text-shadow: 0 8px 30px rgba(21, 32, 28, 0.4);
        }

        .corner {
          position: absolute;
          width: 30px;
          height: 30px;
          opacity: 0.78;
        }

        .corner.tl { top: 270px; left: 72px; border-top: 2px solid #e7c9b8; border-left: 2px solid #e7c9b8; }
        .corner.tr { top: 270px; right: 72px; border-top: 2px solid #e7c9b8; border-right: 2px solid #e7c9b8; }
        .corner.bl { bottom: 334px; left: 72px; border-bottom: 2px solid #e7c9b8; border-left: 2px solid #e7c9b8; }
        .corner.br { bottom: 334px; right: 72px; border-bottom: 2px solid #e7c9b8; border-right: 2px solid #e7c9b8; }
      </style>

      <div id="root" data-composition-id="scene03" data-width="1080" data-height="1920" data-duration="2.6">
        <img id="scene03-photo" class="photo" data-layout-allow-overflow src="assets/images/scene-03-train-beginning.png" alt="" />
        <div class="grade"></div>
        <div class="scrim"></div>
        <div id="scene03-grain" class="grain"></div>

        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>

        <div id="scene03-meta" class="meta" data-layout-allow-overlap>
          <span>ItalyPath</span>
          <span class="meta-index">03 / 04</span>
        </div>

        <div id="scene03-copy" class="copy" data-layout-allow-overlap>
          <div id="scene03-rule" class="accent-rule"></div>
          <div class="title">Doğru adımlarla.</div>
        </div>
      </div>

      <script>
        window.__timelines = window.__timelines || {};
        const scene03 = gsap.timeline({ paused: true });

        scene03.fromTo(
          "#scene03-photo",
          { scale: 1.045, x: -8, y: -8 },
          { scale: 1.08, x: 14, y: 5, duration: 2.6, ease: "none" },
          0,
        );
        scene03.fromTo(
          "#scene03-copy",
          { y: 26, opacity: 0 },
          { y: 0, opacity: 1, duration: 0.66, ease: "power2.out" },
          0.28,
        );
        scene03.fromTo(
          "#scene03-rule",
          { scaleX: 0 },
          { scaleX: 1, duration: 0.56, ease: "power3.out" },
          0.4,
        );
        scene03.fromTo(
          "#scene03-meta",
          { y: -12, opacity: 0 },
          { y: 0, opacity: 1, duration: 0.62, ease: "sine.out" },
          0.42,
        );
        scene03.fromTo(
          "#scene03-grain",
          { opacity: 0.14, x: -1 },
          { opacity: 0.2, x: 2, duration: 2.6, ease: "none" },
          0,
        );

        window.__timelines["scene03"] = scene03;
      </script>
    </template>
  </body>
</html>
