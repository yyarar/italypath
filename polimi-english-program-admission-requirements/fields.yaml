schema_name: "polimi_english_program_admission_requirements"
schema_version: "1.0"
generated_at: "2026-06-02"
output_format:
  type: "json_object_per_program"
  required_fields:
    - program_name
    - level
    - teaching_language
    - campus
    - degree_class
    - admission_type
    - academic_requirements
    - language_requirements
    - application_deadline_eu
    - application_deadline_non_eu
    - required_documents
    - entry_exam_or_test
    - tuition_or_fees_link
    - official_program_url
    - official_call_url
    - source_quotes
    - uncertainty_notes
  empty_value_policy: "Use null only when an official Polimi source was checked and the value is not found. Use uncertainty_notes to explain."
  citation_policy:
    - "Every populated requirement, deadline, test, document, and fee field should include official Polimi source URLs."
    - "source_quotes must contain short quotes from official Polimi sources only."
    - "If a value is inferred from catalogue tags, source the catalogue and mark the inference."

field_categories:
  - category: "Program Identity"
    description: "Stable identity fields for matching each result to one official Polimi degree programme."
    fields:
      - name: "program_name"
        type: "string"
        detail_level: "brief"
        description: "Official programme name exactly as shown in the Politecnico di Milano catalogue."
      - name: "level"
        type: "enum"
        allowed_values: ["bachelor", "master", "single-cycle", "other"]
        detail_level: "brief"
        description: "Normalized degree level. Use bachelor for Laurea, master for Laurea Magistrale, single-cycle when the official source explicitly treats the programme as single-cycle."
      - name: "official_level_type"
        type: "string"
        detail_level: "moderate"
        description: "Official Polimi wording such as Bachelor of Science, Master of Science, Laurea, Laurea Magistrale, single-cycle Master of Science, or partner/joint programme."
      - name: "teaching_language"
        type: "string"
        detail_level: "brief"
        description: "Official language tag or phrase from the catalogue/programme page, for example ENG, ITA-ENG, English, or Italian or English."
      - name: "campus"
        type: "string_or_array"
        detail_level: "brief"
        description: "Official campus or campuses listed for the programme."
      - name: "degree_class"
        type: "string_or_null"
        detail_level: "moderate"
        description: "Italian degree class if available from the programme page, course handbook, educational regulations, or official call."
      - name: "study_area"
        type: "enum_or_string"
        allowed_values: ["Architecture", "Design", "Engineering", "Partner University", "Other"]
        detail_level: "brief"
        description: "Study area or school bucket used by Polimi admission/deadline pages."
      - name: "partner_institution"
        type: "string_or_null"
        detail_level: "moderate"
        description: "Partner institution named by official Polimi sources, if the programme is joint or partner-university based."
      - name: "programme_approval_status"
        type: "string_or_null"
        detail_level: "moderate"
        description: "Approval or pending-approval status, especially for new 2026/2027 English-taught bachelor programmes."
      - name: "official_program_url"
        type: "url"
        detail_level: "brief"
        description: "Official Polimi programme-detail URL."

  - category: "Admission Classification"
    description: "How admission works for the programme and applicant route."
    fields:
      - name: "admission_type"
        type: "enum_or_string"
        allowed_values: ["open access", "restricted access", "TOLC", "SAT", "selection call", "TOLD", "ARCHED", "portfolio/evaluation", "other"]
        detail_level: "moderate"
        description: "Primary admission mechanism. If multiple mechanisms apply, list all and explain by applicant route."
      - name: "school_specific_admission_rule"
        type: "string_or_null"
        detail_level: "detailed"
        description: "School-specific rule for Engineering, Design, AUIC/Architecture, partner programmes, or foreign-qualification applicants."
      - name: "applicant_route"
        type: "array"
        detail_level: "detailed"
        description: "Applicant routes covered by the extracted requirements, such as Italian qualification, foreign qualification, EEA, non-EEA abroad, non-EEA resident in Italy."
      - name: "application_platform"
        type: "string_or_null"
        detail_level: "moderate"
        description: "Official application channel, such as Polimi Online Services, Universitaly, a school ranking procedure, or a partner-university portal."
      - name: "application_round"
        type: "array_or_string_or_null"
        detail_level: "moderate"
        description: "Admission round or call name: early bird, 1st call, 2nd call, additional call, first ranking, second phase, semester I/II."
      - name: "intake_semester_availability"
        type: "string_or_null"
        detail_level: "moderate"
        description: "Whether the programme has September intake, February intake, both, or only a school-specific intake."
      - name: "admission_outcome_type"
        type: "array_or_string_or_null"
        detail_level: "moderate"
        description: "Official possible outcomes, such as admitted, assigned, reserved, pending, waiting list, single courses for curricular integrations, suspended, rejected."
      - name: "ranking_methodology"
        type: "string_or_null"
        detail_level: "detailed"
        description: "How ranking or selection is calculated, including points, first-choice rules, tie-breakers, portfolio/interview evaluation, or test-score ordering."
      - name: "places_and_foreign_contingent"
        type: "string_or_null"
        detail_level: "detailed"
        description: "Total places, reserved places, international quota, non-EU quota, or contingent values when officially published."
      - name: "official_call_url"
        type: "url_or_null"
        detail_level: "brief"
        description: "Official Polimi call, admission guide, or admission page URL that governs this programme."

  - category: "Academic Requirements"
    description: "Prior qualification, curricular, and merit requirements."
    fields:
      - name: "academic_requirements"
        type: "object_or_string"
        detail_level: "detailed"
        description: "Academic eligibility requirements: secondary-school diploma and years of schooling for Laurea, first-level university degree and ECTS/curricular rules for Laurea Magistrale, programme-specific prerequisites."
      - name: "country_specific_eligibility"
        type: "string_or_null"
        detail_level: "detailed"
        description: "Country-specific qualification, minimum GPA, statement, diploma, or validation requirements for foreign qualifications."
      - name: "curricular_integration_policy"
        type: "string_or_null"
        detail_level: "detailed"
        description: "Policy for curricular gaps, single courses, integrations, conditional admission, or required credits before enrolment."
      - name: "conditional_enrolment_policy"
        type: "string_or_null"
        detail_level: "moderate"
        description: "Rules for applicants who have not yet completed the required diploma/degree by enrolment."

  - category: "Language Requirements"
    description: "English and Italian language obligations for admission and post-admission progression."
    fields:
      - name: "language_requirements"
        type: "object_or_string"
        detail_level: "detailed"
        description: "Language certificates, exemptions, minimum scores, expiration rules, and whether English/Italian is required before enrolment."
      - name: "language_submission_timing"
        type: "string_or_null"
        detail_level: "moderate"
        description: "When language certification must be uploaded or validated."
      - name: "post_admission_italian_requirement"
        type: "string_or_null"
        detail_level: "moderate"
        description: "Italian OFA or Italian-proficiency obligation for students admitted to English-taught programmes."

  - category: "Deadlines and Fees"
    description: "Application and enrolment timing, separated by route wherever official pages distinguish them."
    fields:
      - name: "application_deadline_eu"
        type: "object_or_string_or_null"
        detail_level: "detailed"
        description: "Application and/or enrolment deadlines for EU, EEA, equivalent, or Italy-resident applicants, preserving official date, time, timezone, and call name."
      - name: "application_deadline_non_eu"
        type: "object_or_string_or_null"
        detail_level: "detailed"
        description: "Application and/or enrolment deadlines for non-EU/non-EEA applicants, non-EU abroad, reserved places, pre-enrolment, or visa route."
      - name: "application_fee"
        type: "string_or_null"
        detail_level: "moderate"
        description: "Application fee if stated by official Polimi sources; keep separate from tuition."
      - name: "visa_preenrolment_deadline"
        type: "string_or_null"
        detail_level: "moderate"
        description: "Universitaly or visa pre-enrolment deadline for non-EU applicants, if official Polimi sources provide it."
      - name: "tuition_or_fees_link"
        type: "url_or_null"
        detail_level: "brief"
        description: "Official Polimi tuition, fees, costs, or scholarship URL relevant to the programme/applicant level."

  - category: "Documents"
    description: "Documents required for application, admission, and enrolment."
    fields:
      - name: "required_documents"
        type: "array_or_string"
        detail_level: "detailed"
        description: "Required documents such as diploma, transcript, passport/ID, language certificate, CV, portfolio, motivation letter, study plan, degree certificate, translations, CIMEA/DoV, or partner-specific documents."
      - name: "document_translation_authentication"
        type: "string_or_null"
        detail_level: "moderate"
        description: "Official translation, legalized/apostilled document, CIMEA Statement, Declaration of Value, Diploma Supplement, stamped transcript, or authentication requirement."

  - category: "Tests and Selection"
    description: "Entrance exam, admission test, alternative test, interview, portfolio, and selection mechanics."
    fields:
      - name: "entry_exam_or_test"
        type: "object_or_string_or_null"
        detail_level: "detailed"
        description: "Required or accepted test: TOL, TOLC-I, English TOLC-I, CEnT-S, SAT, TOLD, ARCHED, interview, portfolio, national/partner test, or programme-specific evaluation."
      - name: "test_variant_and_session"
        type: "string_or_null"
        detail_level: "moderate"
        description: "Specific test variant, language, session date/window, online/in-person mode, and registration window."
      - name: "test_score_conversion_or_threshold"
        type: "string_or_null"
        detail_level: "detailed"
        description: "Minimum score, score conversion, threshold, OFA trigger, or ranking-score rule."

  - category: "Evidence and Uncertainty"
    description: "Traceability controls for deep research outputs."
    fields:
      - name: "source_quotes"
        type: "array"
        detail_level: "detailed"
        description: "Short direct quotes from official Polimi pages/PDFs, each with source URL and field(s) supported."
        item_shape:
          quote: "string"
          source_url: "url"
          supports_fields: "array"
      - name: "source_urls_checked"
        type: "array"
        detail_level: "moderate"
        description: "Official URLs checked for this programme, including pages that did not contain the target field."
      - name: "source_year"
        type: "string_or_null"
        detail_level: "brief"
        description: "Academic year of the governing source, prioritizing 2026/2027."
      - name: "uncertainty_notes"
        type: "array"
        detail_level: "detailed"
        description: "Reserved field for unresolved issues, mixed-route ambiguity, missing 2026/2027 pages, inferred values, partner-programme ambiguity, or conflicting official sources."

uncertain:
  reserved_field: "uncertainty_notes"
  common_uncertainties_to_check:
    - "2026/2027 page unavailable and latest official year used instead."
    - "Programme is ITA-ENG and official source does not clearly separate English track requirements."
    - "Partner university controls part of admission or tuition."
    - "Catalogue level conflicts with programme-page narrative, especially MEDTEC School."
    - "Deadline differs by applicant route or qualification route."
    - "Admission call is school-level and not programme-specific."
    - "Degree class is absent from programme page and must be checked in course handbook or educational regulations."
