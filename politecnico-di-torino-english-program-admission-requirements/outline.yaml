  citation_policy:
    - "Every non-empty requirement/deadline/test/fee field must cite at least one official PoliTo source URL."
    - "Use short direct quotes only; prefer paraphrase for long official text."
    - "Always verify the fully-English claim on the official programme or curriculum page and record the result."
