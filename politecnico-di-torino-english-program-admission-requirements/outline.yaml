research_language: "en"

scope:
  institution: "Politecnico di Torino (PoliTo)"
  allowed_sources:
    - "Official Politecnico di Torino pages only (polito.it domain)"
    - "Official programme pages under www.polito.it/en/education/..."
    - "Official programme curriculum pages (.../programme-curriculum)"
    - "Official admissions/enrolment pages under www.polito.it/en/education/applying-studying-graduating/..."
    - "Official apply platform (didattica.polito.it/.../pkg_apply)"
    - "Official PoliTo PDFs/calls hosted under polito.it or didattica.polito.it"
  source_priority:
    - "Use 2026/2027 admission pages or calls where available."
    - "If 2026/2027 is not published for a programme, use the latest official PoliTo year and flag uncertainty."
  english_definition: "BROAD reading approved by product owner: a programme qualifies if a student can complete it 100% in English — either the whole programme is catalogue-labelled 'English', OR the programme is bilingual ('Italian, English') but offers a COMPLETE fully-English track/percorso across all years."
  included_programmes:
    - "Programmes catalogue-labelled 'English' (entirely English)."
    - "Bilingual programmes that contain a verified complete fully-English track (Percorso in lingua inglese / Percorso internazionale / named English specialisation)."
    - "Bachelor (Laurea / 1st cycle) and Master (Laurea Magistrale / 2nd cycle)."
  excluded_programmes:
    - "Programmes taught only in Italian (e.g. Aerospace, Biomedical, Mathematical Engineering masters)."
    - "Programmes whose 'English option' is only a partial set of courses with no complete English plan."
    - "Inter-university programmes hosted on another university's domain (e.g. Food Tech -> unisg.it, Sustainable Design for Food Systems -> unipr.it)."
    - "PhD, specialising masters (master di I/II livello), exchange-only tracks, single courses."
  item_definition: "Each item is one official PoliTo degree programme at one level, not one track, call, or campus."
  uncertain_programmes_policy: "Product owner approved INCLUDE + VERIFY for borderline programmes. Borderline items (Civil Eng MSc, Electronic Eng MSc, Architecture group, Building Eng, Materials Eng, Industrial Production, Architecture bachelor) are kept as items; each deep-research agent must verify on the official curriculum page whether a complete fully-English plan exists and set is_fully_english_programme / has_complete_english_track accordingly. If verification proves NOT fully English, keep the JSON but set has_complete_english_track: false and explain in uncertainty_notes (do not silently drop)."

