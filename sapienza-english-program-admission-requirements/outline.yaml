    - "Programmes taught only in Italian."
    - "Specialising masters (Master universitari), PhD programmes, exchange-only tracks, single courses, and non-degree offerings."
    - "Non-official aggregator pages or third-party admissions summaries."
  item_definition: "Each item is one official degree programme, not one faculty, call, or intake."
  partially_english_policy: "Partially-English programmes (marked bilingual by Sapienza) are included but must be flagged with partially_english_flag: true."

