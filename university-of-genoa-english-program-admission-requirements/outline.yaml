topic: "University of Genoa English-taught degree programme admission requirements"
research_question: "List University of Genoa English-taught bachelor's, master's, and single-cycle degree programmes and collect official admission requirements for each programme, prioritising A.Y. 2026/2027."

institution:
  name: "University of Genoa"
  short_name: "UniGe"
  official_domains:
    - "unige.it"
    - "corsi.unige.it"
    - "unigeapply.unige.it"

source_policy:
  allowed_sources: >-
    Only official University of Genoa sources: central unige.it pages, the
    corsi.unige.it course catalogue, official PDF calls / Bando documents hosted
    on unige.it, and the UniGeApply international pre-evaluation portal.
  excluded_sources: >-
    Aggregators, agencies, forums, ranking sites, social media, and any
    non-University pages. IMPORTANT: exclude switch edu-id, unige.eu and
    unige.ch pages — those belong to the University of Geneva (Switzerland), not
    Genoa (Italy).
  priority_year: "2026/2027"
  fallback_year: "Use the newest published official academic year (e.g. 2025/2026) when 2026/2027 is not yet available."

# Verified entry points used to build this item list (cross-checked 2026-06-09).
seed_sources:
  english_course_catalogue:
    url: "https://corsi.unige.it/en/corsi/lingua/en"
    note: "Official course catalogue filtered to English-taught degree courses."
  unigeapply_main:
    url: "https://unige.it/en/internazionale/iscrizioni-internazionali/unigeapply"
    note: "UniGeApply international admissions hub for A.Y. 2026/27."
  unigeapply_masters_english:
    url: "https://unige.it/en/internazionale/procedura-prevalutazione-lauree-magistrali-inglese-solo-studenti-non-eu-residenti-all"
    note: "Pre-evaluation selection page listing English-taught Master's degrees for non-EU candidates."

# Known global admission context (verified from UniGeApply, 2026/27).
# Per-program deadlines should still be confirmed during deep research; these
# are the institution-wide windows and the known early closures.
known_context:
  application_windows_2026_27:
    fall_session_visa_applicants: "Opens 26 Nov 2025 — closes 20 Mar 2026"
    spring_session_residents: "Opens 9 Apr 2026 — Master's close 28 Aug 2026; Bachelor's & single-cycle close 25 Sep 2026"
  known_early_closures_fall_session:
    maritime-science-and-technology: "18 Feb 2026"
    computer-engineering-bachelor: "8 Mar 2026"
    medical-pharmaceutical-biotechnology: "13 Feb 2026"
  candidates_per_application: "Up to 2 courses of study per applicant on UniGeApply."

