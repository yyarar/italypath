  uncertainty_notes: []
  uncertain: []
normalization_notes:
  - "Use 'single-cycle' for International Medical School (IMS), not master."
  - "For Italian, English programmes, do not mark as fully English unless the programme page states the English curriculum is complete."
  - "For deadlines, distinguish application submission, ranking, enrolment, language certificate upload, and Universitaly pre-enrolment when the official source separates them."
  - "For non-EU fields, prioritize non-EU applicants residing abroad and requiring a visa."
