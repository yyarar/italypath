  - program_name: "Industrial Mathematics (ECMI)"
    reason: "Listed under international consortium programmes, but primary admission pages are external; collect only if an official UniMi-hosted page provides actionable requirements."
  - program_name: "Algebra, Geometry & Number Theory (ALGANT)"
    reason: "Listed under international consortium programmes, but primary admission pages are external; collect only if an official UniMi-hosted page provides actionable requirements."
execution:
  batch_size: 5
  items_per_agent: 1
  output_dir: "./results"
  output_format: "one JSON file per program item"
  naming_convention: "{level}-{program_slug}.json"
quality_gates:
  - "Every item must include official_program_url from an allowed UniMi domain."
  - "Every populated field must be backed by at least one source_quotes entry."
  - "Mark uncertain fields explicitly in uncertainty_notes instead of guessing."
  - "Do not normalize open/restricted/TOLC/SAT/selection call unless the official text supports it."
