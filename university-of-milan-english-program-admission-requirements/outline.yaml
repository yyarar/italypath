source_policy:
  allowed_domains:
    - "www.unimi.it"
    - "apps.unimi.it"
    - "*.cdl.unimi.it"
    - "sites.unimi.it"
  forbidden_sources:
    - "third-party aggregators"
    - "student blogs"
    - "consultancy websites"
    - "non-UniMi consortium pages unless mirrored or cited on an official UniMi page"
  priority_rules:
    - "Prefer A.Y. 2026/2027 official programme pages and calls."
    - "If 2026/2027 admission details are not published, use the most recent official UniMi year and record the year in uncertainty_notes."
    - "If a programme is only partially English-taught, keep teaching_language literal and explain curriculum scope in uncertainty_notes."
