    url: "https://www.unipd.it/en/corsi-laurea-magistrale-lingua-inglese"
    quote: "The degree programmes offered by the University include the possibility of enrolling in master's degree programmes taught exclusively in English."
  study_english_how_to_apply:
    url: "https://www.unipd.it/en/studying-padova/admission/how-apply/study-english-how-apply"
    quote: "Degree programmes with an unlimited number of places: First call: November 2, 2025 - February 2, 2026; Second call: March 2 - May 2, 2026; Third call: June 2 - August 2, 2026."
  english_language_requirement:
    url: "https://www.unipd.it/en/english-language-admission"
    quote: "A minimum level of English language proficiency is required for degree programmes taught in English."
  tuition_fees:
    url: "https://www.unipd.it/en/tuition-fees"
