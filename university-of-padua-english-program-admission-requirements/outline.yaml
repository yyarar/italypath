topic: "University of Padua English-taught degree programme admission requirements"
research_question: "List University of Padua English-taught bachelor's, master's, and single-cycle degree programmes and collect official admission requirements for each programme."
institution:
  name: "University of Padua"
  official_domains:
    - "unipd.it"
    - "apply.unipd.it"
source_policy:
  allowed_sources: "Only official University of Padua sources, including central unipd.it pages, department subdomains under unipd.it, official PDF calls hosted on unipd.it, and apply.unipd.it course pages."
  excluded_sources: "Aggregator, agency, forum, ranking, social media, and non-University pages."
  priority_year: "2026/2027"
  fallback_year: "Use the newest official academic year available when 2026/2027 is not published."
seed_sources:
  english_degree_list:
    url: "https://www.unipd.it/en/corsi-laurea-lingua-inglese"
    quote: "The University's degree programmes include the possibility of enrolling in degree programmes and single-cycle master's degree programmes taught exclusively in English."
